name: Validate and Deploy

on:
  push:
    branches:
      - '**'
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Install yq
        run: |
          wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          chmod +x /usr/local/bin/yq
          
      - name: Validate YAML files
        run: |
          for F in ./OAS_Contracten/*.yaml; do
            echo "Converting $F"
            json_file=$(echo $F | sed "s/.yaml/.json/")
            yq -o=json "$F" > "$json_file"
            echo "Converted $F to $json_file"
          done
          git diff --text --exit-code HEAD || (echo "You should probably run the YAML to JSON conversion locally" && exit 1)
          
  deploy_test:
    runs-on: ubuntu-latest
    needs: lint
    if: github.ref == 'refs/heads/develop'
    environment:
      name: test
      
    steps:
      - name: Deploy to test
        run: |
          echo "deployed to test environment"
          
  deploy_accept:
    runs-on: ubuntu-latest
    needs: lint
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: accept
      
    steps:
      - name: Deploy to accept
        run: |
          echo "deployed to accept environment"
    # Manual approval in GitHub is handled through environment protection rules
    
  deploy_prod:
    runs-on: ubuntu-latest
    needs: deploy_accept
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: prod
      
    steps:
      - name: Deploy to production
        run: |
          echo "deployed to production environment" 