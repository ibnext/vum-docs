openapi: 3.0.0
info:
  title: VUM API Vacatures tussen VUM-UV en bronnen
  description: Contract tbv interactie van bronnen met VUM uitwisselingsvoorziening voor Vacatures
  contact:
    name: Helpdesk
    url: https://www.twi-programma.nl
    email: beheer@twi-programma.nl
  version: '1.0.0'
servers:
- url: https://api.example.com/v1
paths:
  /vacatures/matches:
    post:
      summary: Zoekopdracht voor Vacatures
      description: Zoekopdracht om Vacature matches op te vragen
      operationId: MatchesVacatures
      parameters:
        - in: header
          name: X-VUM-berichtVersie
          schema:
            type: string
          required: true
        - in: header
          name: X-VUM-fromParty
          schema:
            type: string
          required: true
        - in: header
          name: X-VUM-toParty
          schema:
            type: string
          required: true
        - in: header
          name: X-VUM-viaParty
          schema:
            type: string
          required: false
        - in: header
          name: X-VUM-SUWIparty
          schema:
            type: boolean
          required: true
      requestBody:
        $ref: '#/components/requestBodies/VacatureMatchesRequest'
      responses:
        '200':
          description: 'OK'
          headers:
            X-VUM-berichtVersie:
              schema:
                type: string
            X-VUM-fromParty:
              schema:
                type: string
            X-VUM-toParty:
              schema:
                type: string
            X-VUM-viaParty:
              schema:
                type: string
          content:
            application/json:
              schema:
                required:
                  - maximumAantalResultatenBereikt
                  - matches
                type: object
                properties:
                  maximumAantalResultatenBereikt:
                    type: boolean
                    description: "Geeft aan of bron meer matches zou kunnen leveren dan de teruggeleverde set. Bronnen mogen per zoekvraag een maximum aantal (standaard 100) resultaten leveren"
                  matches:
                    $ref: '#/components/schemas/VacatureMatchingProfielen'
        '400':
          description: 'Bad request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 'not authorized'
        '429':
          description: 'Too Many Requests'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: 'Service Unavailable'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /vacatures/{idVacature}:
    get:
      summary: Vraag volledige vacature op bij opgegeven idVacature
      description: Vraag volledige vacature op bij een opgegeven idVacature
      operationId: getVacature
      parameters:
        - name: idVacature
          in: path
          required: true
          style: simple
          explode: false
          schema:
            $ref: '#/components/schemas/IDVacature'
        - in: header
          name: X-VUM-berichtVersie
          schema:
            type: string
          required: true
        - in: header
          name: X-VUM-fromParty
          schema:
            type: string
          required: true
        - in: header
          name: X-VUM-toParty
          schema:
            type: string
          required: true
        - in: header
          name: X-VUM-viaParty
          schema:
            type: string
          required: false
        - in: header
          name: X-VUM-SUWIparty
          schema:
            type: boolean
          required: true      
      responses:
        '200':
          description: 'OK'
          headers:
            X-VUM-berichtVersie:
              schema:
                type: string
            X-VUM-fromParty:
              schema:
                type: string
            X-VUM-toParty:
              schema:
                type: string
            X-VUM-viaParty:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vacature'
        '400':
          description: 'Bad request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: 'not authorized'
        '429':
          description: 'Too Many Requests, limiet is overschreden voor deze uitvraag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: 'Internal Server Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: 'Service Unavailable'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
