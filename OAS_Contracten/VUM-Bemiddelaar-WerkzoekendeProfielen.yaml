openapi: 3.1.0
info:
  title: VUM API werkzoekendeProfielen tussen VUM-UV en bemiddelaar
  description: Contract tbv interactie van bemiddelaars met VUM uitwisselingsvoorziening
    voor werkzoekendeProfielen
  contact:
    name: Helpdesk
    url: https://www.matchingsgegevens.nl
    email: programma-vum@ictu.nl
  version: 2.0.0
servers:
- url: https://test.vumdevelopment.nl/api/v2
  description: staging/test server
- url: https://accept.vumdevelopment.nl/api/v2
  description: acceptatie server
- url: https://prod.vumdevelopment.nl/api/v2
  description: productie server
paths:
  /werkzoekendeProfielen/matches:
    post:
      summary: Zoekopdracht voor MatchingProfielen werkzoekende
      description: Zoekopdracht om matches voor Werkzoekende MatchingProfielen op
        te vragen
      operationId: MatcheswerkzoekendeProfielen
      parameters:
      - $ref: '#/components/parameters/vum_bericht_versie'
      - $ref: '#/components/parameters/vum_from_party'
      - $ref: '#/components/parameters/vum_to_party'
      - $ref: '#/components/parameters/vum_via_party'
      - $ref: '#/components/parameters/api_version'
      requestBody:
        $ref: '#/components/requestBodies/WerkzoekendeProfielMatchesRequest'
      responses:
        '200':
          description: OK
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                required:
                - maximumAantalResultatenBereikt
                - matches
                type: object
                properties:
                  maximumAantalResultatenBereikt:
                    type: boolean
                    description: Geeft aan of bron meer matches zou kunnen leveren
                      dan de teruggeleverde set. Bronnen mogen per zoekvraag een maximum
                      aantal (standaard 100) resultaten leveren
                  matches:
                    $ref: '#/components/schemas/WerkzoekendeMatchingProfielen'
        '400':
          description: Bad request
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: not authorized
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
        '429':
          description: Too Many Requests
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service Unavailable
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /werkzoekendeProfielen/{vumID}:
    get:
      summary: Vraag detailprofielen op bij opgegeven vumID
      description: Vraag detailprofielen op bij een opgegeven vumID
      operationId: getWerkzoekendeProfiel
      parameters:
      - in: path
        name: vumID
        required: true
        style: simple
        explode: false
        schema:
          $ref: '#/components/schemas/VumID'
      - $ref: '#/components/parameters/vum_bericht_versie'
      - $ref: '#/components/parameters/vum_from_party'
      - $ref: '#/components/parameters/vum_to_party'
      - $ref: '#/components/parameters/vum_via_party'
      - $ref: '#/components/parameters/api_version'
      responses:
        '200':
          description: OK
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                type: object
                properties:
                  bronID:
                    $ref: '#/components/schemas/String200'
                  werkzoekende:
                    $ref: '#/components/schemas/Werkzoekende'
        '400':
          description: Bad request
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: not authorized
          headers:
            API-Version:
              $ref: '#/components/headers/api_version'
        '429':
          description: Too Many Requests, limiet is overschreden voor deze uitvraag
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service Unavailable
          headers:
            X-VUM-berichtVersie:
              $ref: '#/components/headers/vum_bericht_versie'
            X-VUM-fromParty:
              $ref: '#/components/headers/vum_from_party'
            X-VUM-toParty:
              $ref: '#/components/headers/vum_to_party'
            X-VUM-viaParty:
              $ref: '#/components/headers/vum_via_party'
            API-Version:
              $ref: '#/components/headers/api_version'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  headers:
    api_version:
      schema:
        enum:
        - 2.0.0
        type: string
    vum_bericht_versie:
      schema:
        const: 2.0.0
        type: string
    vum_from_party:
      schema:
        type: string
    vum_to_party:
      schema:
        type: string
    vum_via_party:
      schema:
        type: string
  parameters:
    api_version:
      in: header
      name: API-Version
      required: true
      schema:
        enum:
        - 2.0.0
        type: string
    vum_bericht_versie:
      in: header
      name: X-VUM-berichtVersie
      required: true
      schema:
        const: 2.0.0
        type: string
    vum_from_party:
      in: header
      name: X-VUM-fromParty
      required: true
      schema:
        type: string
    vum_to_party:
      in: header
      name: X-VUM-toParty
      required: true
      schema:
        type: string
    vum_via_party:
      in: header
      name: X-VUM-viaParty
      required: true
      schema:
        type: string
  requestBodies:
    WerkzoekendeProfielMatchesRequest:
      content:
        application/json:
          schema:
            additionalProperties: false
            properties:
              vraagObject:
                $ref: '#/components/schemas/MPWerkzoekende'
            required:
            - vraagObject
            type: object
      required: true
  schemas:
    Arbeidsmarktkwalificatie:
      additionalProperties: false
      properties:
        codeWerkEnDenkniveauWerkzoekende:
          enum:
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
          type: integer
        cursus:
          items:
            $ref: '#/components/schemas/Cursus'
          type: array
        gedragscompetentie:
          items:
            $ref: '#/components/schemas/Gedragscompetentie'
          type: array
        interesse:
          items:
            $ref: '#/components/schemas/Interesse'
          type: array
        opleiding:
          items:
            $ref: '#/components/schemas/Opleiding'
          type: array
        rijbewijs:
          items:
            $ref: '#/components/schemas/Rijbewijs'
          type: array
        taalbeheersing:
          items:
            $ref: '#/components/schemas/Taalbeheersing'
          type: array
        vakvaardigheid:
          items:
            $ref: '#/components/schemas/Vakvaardigheid'
          type: array
        werkervaring:
          items:
            $ref: '#/components/schemas/Werkervaring'
          type: array
      type: object
    Beroepsnaam:
      oneOf:
      - $ref: '#/components/schemas/BeroepsnaamGecodeerd'
      - $ref: '#/components/schemas/BeroepsnaamOngecodeerd'
    BeroepsnaamGecodeerd:
      additionalProperties: false
      properties:
        beroepsnaamGecodeerd:
          additionalProperties: false
          properties:
            codeBeroepsnaam:
              $ref: '#/components/schemas/codeBeroepsnaam'
            omschrijvingBeroepsnaam:
              $ref: '#/components/schemas/String120'
          type: object
      type: object
    BeroepsnaamOngecodeerd:
      additionalProperties: false
      properties:
        beroepsnaamOngecodeerd:
          additionalProperties: false
          properties:
            naamBeroepOngecodeerd:
              $ref: '#/components/schemas/String120'
          type: object
      type: object
    ContactpersoonAfdeling:
      additionalProperties: false
      properties:
        naamContactpersoonAfdeling:
          $ref: '#/components/schemas/String35'
        emailadres:
          $ref: '#/components/schemas/Emailadres'
        telefoonnummer:
          $ref: '#/components/schemas/Telefoonnummer'
      type: object
    Contractvorm:
      additionalProperties: false
      properties:
        codeTypeOvereenkomst:
          enum:
          - '01'
          - '02'
          - '03'
          - '04'
          type: string
        codeTypeArbeidscontract:
          $ref: '#/components/schemas/codeTypeArbeidscontract'
      type: object
    Cursus:
      additionalProperties: false
      properties:
        naamCursus:
          $ref: '#/components/schemas/String120'
        datumAanvangVolgenCursus:
          $ref: '#/components/schemas/Date'
        datumCertificaat:
          $ref: '#/components/schemas/Date'
        datumEindeVolgenCursus:
          $ref: '#/components/schemas/Date'
        naamOpleidingsinstituut:
          $ref: '#/components/schemas/String500'
      type: object
    Date:
      format: date
      type: string
    EisAanWerk:
      additionalProperties: false
      properties:
        indicatieAanpassingWerkomgeving:
          $ref: '#/components/schemas/Indicatie'
        indicatieBegeleiding:
          $ref: '#/components/schemas/Indicatie'
        indicatieWerkvariatie:
          $ref: '#/components/schemas/Indicatie'
      type: object
    Emailadres:
      $ref: '#/components/schemas/String320'
    Error:
      properties:
        code:
          $ref: '#/components/schemas/StringCode'
        details:
          $ref: '#/components/schemas/String2000'
        message:
          $ref: '#/components/schemas/String500'
      required:
      - code
      - message
      type: object
    Flexibiliteit:
      additionalProperties: false
      properties:
        codeRegiostraal:
          maximum: 9
          minimum: 1
          type: integer
        datumAanvangBeschikbaarVoorWerk:
          $ref: '#/components/schemas/Date'
        datumEindeBeschikbaarVoorWerk:
          $ref: '#/components/schemas/Date'
        indicatieOnregelmatigWerkOfPloegendienst:
          $ref: '#/components/schemas/Indicatie'
      type: object
    Gedragscompetentie:
      additionalProperties: false
      properties:
        codeBeheersingGedragscompetentie:
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 9
          type: integer
        codeGedragscompetentie:
          enum:
          - '24100'
          - '24101'
          - '24102'
          - '24104'
          - '24105'
          - '24106'
          - '24107'
          - '24108'
          - '24109'
          - '24110'
          - '24111'
          - '24112'
          - '24113'
          - '24114'
          - '24115'
          - '24116'
          - '24118'
          - '24119'
          - '24120'
          - '24121'
          - '24122'
          - '24123'
          - '24124'
          - '24125'
          - '24126'
          type: string
        omschrijvingGedragscompetentie:
          enum:
          - "Beslissen en activiteiten initi\xEBren"
          - Aansturen
          - Begeleiden
          - Aandacht en begrip tonen
          - Samenwerken en overleggen
          - Ethisch en integer handelen
          - Relaties bouwen en netwerken
          - "Overtuigen en be\xEFnvloeden"
          - Presenteren
          - Formuleren en rapporteren
          - Vakdeskundigheid toepassen
          - Materialen en middelen inzetten
          - Analyseren
          - Onderzoeken
          - Creeren en innoveren
          - Leren
          - Plannen en organiseren
          - Op de behoeften en verwachtingen van de klant richten
          - Kwaliteit leveren
          - Instructies en procedures opvolgen
          - Omgaan met verandering en aanpassen
          - Met druk en tegenslag omgaan
          - Gedrevenheid en ambitie tonen
          - Ondernemend en commercieel handelen
          - Bedrijfsmatig handelen
          type: string
      type: object
    IDWerkzoekende:
      $ref: '#/components/schemas/String200'
    Indicatie:
      enum:
      - 0
      - 1
      - 2
      type: integer
    Integer1000:
      maximum: 999
      minimum: 0
      type: integer
    Integer10AsString:
      example: '9999999999'
      maxLength: 10
      pattern: ^[0-9]+$
      type: string
    Integer2:
      maximum: 99
      minimum: 0
      type: integer
    Integer5:
      maximum: 99999
      minimum: 0
      type: integer
    IntegerTaal:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 8
      type: integer
    Interesse:
      additionalProperties: false
      properties:
        naamInteresse:
          $ref: '#/components/schemas/String120'
      type: object
    MPArbeidsmarktkwalificatie:
      additionalProperties: false
      properties:
        codeWerkEnDenkniveauWerkzoekende:
          enum:
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
          type: integer
        cursus:
          items:
            $ref: '#/components/schemas/MPCursus'
          type: array
        gedragscompetentie:
          items:
            $ref: '#/components/schemas/Gedragscompetentie'
          type: array
        opleiding:
          items:
            $ref: '#/components/schemas/MPOpleiding'
          type: array
        rijbewijs:
          items:
            $ref: '#/components/schemas/Rijbewijs'
          type: array
        taalbeheersing:
          items:
            $ref: '#/components/schemas/Taalbeheersing'
          type: array
        vakvaardigheid:
          items:
            $ref: '#/components/schemas/Vakvaardigheid'
          type: array
        werkervaring:
          items:
            $ref: '#/components/schemas/MPWerkervaring'
          type: array
      type: object
    MPCursus:
      additionalProperties: false
      properties:
        datumCertificaat:
          $ref: '#/components/schemas/Date'
        naamCursus:
          $ref: '#/components/schemas/String120'
      type: object
    MPOpleiding:
      additionalProperties: false
      properties:
        codeNiveauOpleiding:
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 9
          type: integer
        indicatieDiploma:
          enum:
          - 0
          - 1
          - 2
          - 8
          type: integer
        datumDiploma:
          $ref: '#/components/schemas/Date'
        opleidingsnaam:
          $ref: '#/components/schemas/Opleidingsnaam'
      type: object
    MPVervoermiddel:
      additionalProperties: false
      properties:
        indicatieBeschikbaarVoorUitvoeringWerk:
          $ref: '#/components/schemas/Indicatie'
        indicatieBeschikbaarVoorWoonWerkverkeer:
          $ref: '#/components/schemas/Indicatie'
      type: object
    MPWerkervaring:
      additionalProperties: false
      properties:
        beroep:
          $ref: '#/components/schemas/Beroepsnaam'
        datumAanvangWerkzaamheden:
          $ref: '#/components/schemas/Date'
        datumEindeWerkzaamheden:
          $ref: '#/components/schemas/Date'
        naamOrganisatie:
          $ref: '#/components/schemas/String70'
      type: object
    MPWerkzoekende:
      properties:
        bemiddelingsberoep:
          $ref: '#/components/schemas/bemiddelingsberoep_selectie'
        contractvorm:
          $ref: '#/components/schemas/contractvorm_selectie'
        flexibiliteit:
          $ref: '#/components/schemas/flexibiliteit_selectie'
        rijbewijs:
          $ref: '#/components/schemas/rijbewijs_selectie'
        selectiegebied:
          $ref: '#/components/schemas/selectiegebied_selectie'
        taalbeheersing:
          $ref: '#/components/schemas/taalbeheersingen_selectie'
        werktijden:
          $ref: '#/components/schemas/werktijden_selectie'
      required:
      - selectiegebied
      type: object
    MPWerkzoekendeMatch:
      additionalProperties: false
      properties:
        arbeidsmarktkwalificatie:
          $ref: '#/components/schemas/MPArbeidsmarktkwalificatie'
        bemiddelingsberoep:
          items:
            $ref: '#/components/schemas/Beroepsnaam'
          type: array
        contractvorm:
          items:
            $ref: '#/components/schemas/Contractvorm'
          type: array
        flexibiliteit:
          $ref: '#/components/schemas/Flexibiliteit'
        indicatieBeschikbaarheidContactgegevens:
          enum:
          - 1
          - 2
          type: integer
        indicatieLdrRegistratie:
          enum:
          - 1
          - 2
          type: integer
        mobiliteit:
          $ref: '#/components/schemas/Mobiliteit'
        sector:
          items:
            $ref: '#/components/schemas/SectorBeroepsEnBedrijfsleven'
          type: array
        vervoermiddel:
          items:
            $ref: '#/components/schemas/MPVervoermiddel'
          type: array
        voorkeursland:
          items:
            $ref: '#/components/schemas/Voorkeursland'
          type: array
        werktijden:
          $ref: '#/components/schemas/Werktijden'
        vumID:
          $ref: '#/components/schemas/VumID'
      required:
      - mobiliteit
      - vumID
      type: object
    Mobiliteit:
      additionalProperties: false
      properties:
        bemiddelingspostcode:
          $ref: '#/components/schemas/Postcode'
        maximaleReisafstand:
          $ref: '#/components/schemas/Integer1000'
        maximaleReistijd:
          $ref: '#/components/schemas/Integer1000'
      type: object
    Opleiding:
      additionalProperties: false
      properties:
        codeNiveauOpleiding:
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 9
          type: integer
        indicatieDiploma:
          enum:
          - 0
          - 1
          - 2
          - 8
          type: integer
        opleidingsnaam:
          $ref: '#/components/schemas/Opleidingsnaam'
        codeStatusOpleiding:
          enum:
          - 0
          - 1
          - 2
          - 3
          type: integer
        datumAanvangVolgenOpleiding:
          $ref: '#/components/schemas/Date'
        datumDiploma:
          $ref: '#/components/schemas/Date'
        datumEindeVolgenOpleiding:
          $ref: '#/components/schemas/Date'
        naamOpleidingsinstituut:
          $ref: '#/components/schemas/String500'
      type: object
    Opleidingsnaam:
      oneOf:
      - $ref: '#/components/schemas/OpleidingsnaamGecodeerd'
      - $ref: '#/components/schemas/OpleidingsnaamOngecodeerd'
    OpleidingsnaamGecodeerd:
      additionalProperties: false
      properties:
        opleidingsnaamGecodeerd:
          additionalProperties: false
          properties:
            codeOpleidingsnaam:
              $ref: '#/components/schemas/Integer10AsString'
            omschrijvingOpleidingsnaam:
              $ref: '#/components/schemas/String120'
          type: object
      type: object
    OpleidingsnaamOngecodeerd:
      additionalProperties: false
      properties:
        opleidingsnaamOngecodeerd:
          additionalProperties: false
          properties:
            naamOpleidingOngecodeerd:
              $ref: '#/components/schemas/String120'
            omschrijvingOpleiding:
              $ref: '#/components/schemas/String2000'
          type: object
      type: object
    Postcode:
      example: 1234AB
      pattern: ^[0-9]{4}[a-zA-Z]{2}$
      type: string
    Rijbewijs:
      additionalProperties: false
