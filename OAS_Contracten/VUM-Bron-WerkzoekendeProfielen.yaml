    Voorkeursland:
      type: object
      additionalProperties: false
      properties:
        landencodeIso:
          $ref: '#/components/schemas/StringCode2'
    String200:
      maxLength: 200
      type: string
    String320:
      maxLength: 320
      type: string
    Integer1000:
      maximum: 999
      minimum: 0
      type: integer
    Indicatie:
      enum: [0, 1, 2]
      type: integer
    Integer2:
      maximum: 99
      minimum: 0
      type: integer
    Integer5:
      maximum: 99999
      minimum: 0
      type: integer
    Integer10AsString:
      maxLength: 10
      type: string
      pattern: '^[0-9]+$'
      example: '9999999999'
    IntegerTaal:
      type: integer
      enum: [0, 1, 2, 3, 4, 8]
    StringCode:
      maxLength: 10
      type: string
    StringCode1:
      maxLength: 1
      type: string
    StringCode2:
      maxLength: 2
      type: string
    StringCode3:
      maxLength: 3
      type: string
    URL:
      type: string
      format: URL
    String120:
      maxLength: 120
      type: string
    String500:
      maxLength: 500
      type: string
    String2000:
      maxLength: 2000
      type: string
    String14:
      maxLength: 14
      type: string
    String35:
      maxLength: 35
      type: string
    String70:
      maxLength: 70
      type: string
    Date:
      type: string
      format: date
    Postcode:
      pattern: ^[0-9]{4}[a-zA-Z]{2}$
      type: string
      example: '1234AB'
    Error:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/StringCode'
        message:
          $ref: '#/components/schemas/String500'
        details:
          $ref: '#/components/schemas/String2000'
      required:
        - code
        - message
  requestBodies:
    WerkzoekendeProfielMatchesRequest:
      content:
        application/json:
          schema:
            required:
            - vraagObject
            type: object
            properties:
              vraagObject:
                $ref: '#/components/schemas/MPWerkzoekende'
      required: true
