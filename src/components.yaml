components:
  headers:
    api_version:
      schema:
        enum:
        - 3.0.0
        type: string
    vum_bericht_versie:
      schema:
        enum:
        - 3.0.0
        type: string
    vum_from_party:
      schema:
        type: string
    vum_to_party:
      schema:
        type: string
    vum_via_party:
      schema:
        type: string
  parameters:
    api_version:
      in: header
      name: API-Version
      required: true
      schema:
        enum:
        - 3.0.0
        type: string
    vum_bericht_versie:
      in: header
      name: X-VUM-berichtVersie
      required: true
      schema:
        enum:
        - 3.0.0
        type: string
    vum_from_party:
      in: header
      name: X-VUM-fromParty
      required: true
      schema:
        type: string
    vum_suwi_party:
      in: header
      name: X-VUM-SUWIparty
      required: true
      schema:
        type: boolean
    vum_to_party:
      in: header
      name: X-VUM-toParty
      required: true
      schema:
        type: string
    vum_via_party:
      in: header
      name: X-VUM-viaParty
      required: true
      schema:
        type: string
  requestBodies:
    VacatureMatchesRequest:
      content:
        application/json:
          schema:
            properties:
              vraagObject:
                $ref: '#/components/schemas/MPVacature'
            required:
            - vraagObject
            type: object
      required: true
    WerkzoekendeProfielMatchesRequest:
      content:
        application/json:
          schema:
            additionalProperties: false
            properties:
              vraagObject:
                $ref: '#/components/schemas/MPWerkzoekende'
            required:
            - vraagObject
            type: object
      required: true
  schemas:
    VacaturesMatchesResponse:
      required:
      - maximumAantalResultatenBereikt
      - vraagID
      - matches
      type: object
      properties:
        maximumAantalResultatenBereikt:
          type: boolean
          description: Geeft aan of bron meer matches zou kunnen leveren
            dan de teruggeleverde set. Bronnen mogen per zoekvraag een maximum
            aantal (standaard 100) resultaten leveren
        vraagID:
          $ref: '#/components/schemas/VraagID'
        matches:
          $ref: '#/components/schemas/VacatureMatchingProfielen'
    WerkzoekendeProfielMatchesResponse:
      required:
      - maximumAantalResultatenBereikt
      - vraagID
      - matches
      type: object
      properties:
        maximumAantalResultatenBereikt:
          type: boolean
          description: Geeft aan of bron meer matches zou kunnen leveren
            dan de teruggeleverde set. Bronnen mogen per zoekvraag een maximum
            aantal (standaard 100) resultaten leveren
        vraagID:
          $ref: '#/components/schemas/VraagID'
        matches:
          $ref: '#/components/schemas/WerkzoekendeMatchingProfielen'
    VraagID:
      maxLength: 100
      type: string
    Adres:
      additionalProperties: false
      properties:
        postcode:
          $ref: '#/components/schemas/Postcode'
        straatnaam:
          $ref: '#/components/schemas/String24'
        huisnummer:
          $ref: '#/components/schemas/Integer5'
        huisnummertoevoeging:
          $ref: '#/components/schemas/String6'
      required:
        - postcode
      type: object          
    ArbeidsVoorwaarden:
      additionalProperties: false
      properties:
        datumAanvangWerkzaamheden:
          $ref: '#/components/schemas/Date'
        datumEindeWerkzaamheden:
          $ref: '#/components/schemas/Date'
        omschrijvingArbeidsvoorwaarden:
          $ref: '#/components/schemas/String2000'
        salarisIndicatie:
          $ref: '#/components/schemas/String100'
      type: object
    Arbeidsmarktkwalificatie:
      additionalProperties: false
      properties:
        codeWerkEnDenkniveauWerkzoekende:
          enum:
          - 0
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 7
          type: integer
        cursus:
          items:
            $ref: '#/components/schemas/Cursus'
          type: array
        competentiebeheersing:
          items:
            $ref: '#/components/schemas/Competentiebeheersing'
          type: array
        interesse:
          items:
            $ref: '#/components/schemas/Interesse'
          type: array
        opleiding:
          items:
            $ref: '#/components/schemas/Opleiding'
          type: array
        rijbewijs:
          items:
            $ref: '#/components/schemas/Rijbewijs'
          type: array
        taalbeheersing:
          items:
            $ref: '#/components/schemas/Taalbeheersing'
          type: array
        werkervaring:
          items:
            $ref: '#/components/schemas/Werkervaring'
          type: array
      type: object
    Beroep:
      additionalProperties: false
      properties:
        codeBeroepsnaam:
          $ref: '#/components/schemas/codeBeroepsnaam'
      type: object      
    Competentiebeheersing:
      additionalProperties: false
      properties:
        codeCompetentie:
          $ref: '#/components/schemas/URI'
      type: object
    ContactpersoonAfdeling:
      additionalProperties: false
      properties:
        emailadres_V:
          items:
            $ref: '#/components/schemas/Emailadres'
          type: array
        emailadres_W:
          $ref: '#/components/schemas/Emailadres'
        naamContactpersoonAfdeling:
          $ref: '#/components/schemas/String35'
        telefoonnummer_V:
          items:
            $ref: '#/components/schemas/Telefoonnummer'
          type: array
        telefoonnummer_W:
          $ref: '#/components/schemas/Telefoonnummer'
      type: object
    Contractvorm:
      additionalProperties: false
      properties:
        codeTypeArbeidscontract:
          $ref: '#/components/schemas/codeTypeArbeidscontract'
        codeTypeOvereenkomst:
          enum:
          - '01'
          - '02'
          - '03'
          - '04'
          type: string
      type: object
    Cursus:
      additionalProperties: false
      properties:
        datumAanvangVolgenCursus_W:
          $ref: '#/components/schemas/Date'
        indicatieCertificaat:
          $ref: '#/components/schemas/IndicatieDiploma'
        datumCertificaat_W:
          $ref: '#/components/schemas/Date'
        datumEindeVolgenCursus_W:
          $ref: '#/components/schemas/Date'
        naamCursus:
          $ref: '#/components/schemas/String120'
        naamOpleidingsinstituut_W:
          $ref: '#/components/schemas/String500'
        toelichtingCursus:
          $ref: '#/components/schemas/String2000'          
      type: object
    Date:
      format: date
      type: string
    EisAanWerk:
      additionalProperties: false
      properties:
        indicatieAanpassingWerkomgeving:
          $ref: '#/components/schemas/Indicatie'
        indicatieBegeleiding:
          $ref: '#/components/schemas/Indicatie'
        indicatieWerkvariatie:
          $ref: '#/components/schemas/Indicatie'
      type: object
    Emailadres:
      $ref: '#/components/schemas/String320'
    Error:
      properties:
        code:
          $ref: '#/components/schemas/StringCode'
        details:
          $ref: '#/components/schemas/String2000'
        message:
          $ref: '#/components/schemas/String500'
      required:
      - code
      - message
      type: object
    Flexibiliteit:
      additionalProperties: false
      properties:
        datumAanvangBeschikbaarVoorWerk_W:
          $ref: '#/components/schemas/Date'
        datumEindeBeschikbaarVoorWerk:
          $ref: '#/components/schemas/Date'
        indicatieOnregelmatigWerkOfPloegendienst:
          $ref: '#/components/schemas/Indicatie'
      type: object
    IDVacature:
      $ref: '#/components/schemas/SafeIDString'
    IDWerkzoekende:
      $ref: '#/components/schemas/SafeIDString'
    Indicatie:
      enum:
      - 0
      - 1
      - 2
      type: integer
    IndicatieDiploma:
      enum:
        - 0
        - 1
        - 2
        - 8 
      type: integer      
    Integer1000:
      maximum: 999
      minimum: 0
      type: integer
    Integer10AsString:
      example: '9999999999'
      maxLength: 10
      pattern: ^[0-9]+$
      type: string
    Integer2:
      maximum: 99
      minimum: 0
      type: integer
    Integer5:
      maximum: 99999
      minimum: 0
      type: integer
    IntegerTaal:
      enum:
      - 0
      - 1
      - 2
      - 3
      - 4
      - 8
      type: integer
    Interesse:
      additionalProperties: false
      properties:
        naamInteresse:
          $ref: '#/components/schemas/String120'
      type: object
    MPVacature:
      properties:
        beroep.codeBeroepsnaam:
          $ref: '#/components/schemas/codeBeroepsnaam_selectie'
        codeWerkEnDenkniveauMinimaal:
          $ref: '#/components/schemas/codeWerkEnDenkNiveauMinimaal_selectie'
        datumAanvangWerkzaamheden:
          $ref: '#/components/schemas/datumAanvangWerkzaamheden_selectie'
        flexibiliteit.indicatieOnregelmatigWerkOfPloegendienst:
          $ref: '#/components/schemas/indicatieOnregelmatigWerkOfPloegendienst_selectie'
        rijbewijs:
          $ref: '#/components/schemas/rijbewijs_selectie'
        selectiegebied:
          $ref: '#/components/schemas/selectiegebied_selectie'
        taalbeheersing:
          $ref: '#/components/schemas/taalbeheersingen_selectie'
        werktijden.aantalWerkurenPerWeekMaximaal:
          $ref: '#/components/schemas/aantalWerkurenPerWeekMaximaal_selectie'
        werktijden.aantalWerkurenPerWeekMinimaal:
          $ref: '#/components/schemas/aantalWerkurenPerWeekMinimaal_selectie'
      required:
      - selectiegebied
      type: object
    MPVacatureMatch:
      additionalProperties: false
      properties:
        adres:
          $ref: '#/components/schemas/Adres'
        arbeidsVoorwaarden:
          $ref: '#/components/schemas/ArbeidsVoorwaarden'
        beroep:
          $ref: '#/components/schemas/Beroep'
        codeWerkEnDenkniveauMinimaal:
          enum:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
          - '7'
          type: string
        competentiebeheersing:
          items:
            $ref: '#/components/schemas/Competentiebeheersing'
          type: array
        contractvorm:
          items:
            $ref: '#/components/schemas/Contractvorm'
          type: array
        cursus:
          items:
            $ref: '#/components/schemas/Cursus'
          type: array
        flexibiliteit:
          $ref: '#/components/schemas/Flexibiliteit'
        idVacature_BRN:
          $ref: '#/components/schemas/IDVacature'
        naamVacature:
          $ref: '#/components/schemas/String120'
        omschrijvingVacature:
          $ref: '#/components/schemas/String2000'          
        opleiding:
          items:
            $ref: '#/components/schemas/Opleiding'
          type: array
        rijbewijs:
          items:
            $ref: '#/components/schemas/Rijbewijs'
          type: array
        sector:
          $ref: '#/components/schemas/SectorBeroepsEnBedrijfsleven'
        sluitingsdatumVacature:
          $ref: '#/components/schemas/Date'
        sollicitatiewijze:
          items:
            $ref: '#/components/schemas/Sollicitatiewijze'
          type: array
        taalbeheersing:
          items:
            $ref: '#/components/schemas/Taalbeheersing'
          type: array
        vervoermiddel:
          items:
            $ref: '#/components/schemas/Vervoermiddel'
          type: array
        vumID_VUM:
          $ref: '#/components/schemas/VumID'
        werkervaring:
          items:
            $ref: '#/components/schemas/Werkervaring'
          type: array
        werkgever:
          $ref: '#/components/schemas/MPWerkgever'
        werktijden:
          $ref: '#/components/schemas/Werktijden'
      required:
      - vumID_VUM
      - adres_V
      - idVacature_BRN
      type: object
    MPWerkgever:
      additionalProperties: false
      properties:
        handelsnaamOrganisatie:
          $ref: '#/components/schemas/String500'
        sector:
          items:
            $ref: '#/components/schemas/SectorBeroepsEnBedrijfsleven'
          type: array
        webadres:
          items:
            $ref: '#/components/schemas/Webadres'
          type: array
      type: object
    MPWerkzoekende:
      properties:
        bemiddelingsberoep:
          $ref: '#/components/schemas/bemiddelingsberoep_selectie'
        contractvorm:
          $ref: '#/components/schemas/contractvorm_selectie'
        flexibiliteit.indicatieOnregelmatigWerkOfPloegendienst:
          $ref: '#/components/schemas/indicatieOnregelmatigWerkOfPloegendienst_selectie'
        arbeidsmarktkwalificatie.rijbewijs:
          $ref: '#/components/schemas/rijbewijs_selectie'
        selectiegebied:
          $ref: '#/components/schemas/selectiegebied_selectie'
        arbeidsmarktkwalificatie.taalbeheersing:
          $ref: '#/components/schemas/taalbeheersingen_selectie'
        datumAanvangBeschikbaarVoorWerk:
          $ref: '#/components/schemas/datumAanvangBeschikbaarVoorWerk_selectie'          
        werktijden.indicatieKantoortijden:
          $ref: '#/components/schemas/indicatieKantoortijden_selectie'
        werktijden.aantalWerkurenPerWeekMaximaal:
          $ref: '#/components/schemas/aantalWerkurenPerWeekMaximaal_selectie'
        werktijden.aantalWerkurenPerWeekMinimaal:
          $ref: '#/components/schemas/aantalWerkurenPerWeekMinimaal_selectie'
      required:
      - selectiegebied
      type: object
    MPWerkzoekendeMatch:
      additionalProperties: false
      properties:
        arbeidsmarktkwalificatie:
          $ref: '#/components/schemas/Arbeidsmarktkwalificatie'
        bemiddelingsberoep:
          items:
            $ref: '#/components/schemas/Beroep'
          type: array
        contractvorm:
          items:
            $ref: '#/components/schemas/Contractvorm'
          type: array
        flexibiliteit:
          $ref: '#/components/schemas/Flexibiliteit'
        idWerkzoekende_BRN:
          $ref: '#/components/schemas/IDWerkzoekende'
        indicatieBeschikbaarheidContactgegevens:
          enum:
          - 1
          - 2
          type: integer
        mobiliteit:
          $ref: '#/components/schemas/Mobiliteit'
        sector:
          items:
            $ref: '#/components/schemas/SectorBeroepsEnBedrijfsleven'
          type: array
        vervoermiddel:
          items:
            $ref: '#/components/schemas/Vervoermiddel'
          type: array
        vumID_VUM:
          $ref: '#/components/schemas/VumID'
        werktijden:
          $ref: '#/components/schemas/Werktijden'
      required:
      - mobiliteit
      - vumID_VUM
      - idWerkzoekende_BRN
      type: object
    Mobiliteit:
      additionalProperties: false
      properties:
        bemiddelingspostcode:
          $ref: '#/components/schemas/Postcode'
        maximaleReisafstand:
          $ref: '#/components/schemas/Integer1000'
        maximaleReistijd:
          $ref: '#/components/schemas/Integer1000'
      required:
        - bemiddelingspostcode
      type: object
    Opleiding:
      additionalProperties: false
      properties:
        codeOpleidingsnaam:
          $ref: '#/components/schemas/Integer10AsString'
        codeNiveauOpleiding:
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 6
          - 9
          type: integer
        codeStatusOpleiding_W:
          enum:
          - 0
          - 1
          - 2
          - 3
          type: integer
        datumAanvangVolgenOpleiding_W:
          $ref: '#/components/schemas/Date'
        datumDiploma_W:
          $ref: '#/components/schemas/Date'
        datumEindeVolgenOpleiding_W:
          $ref: '#/components/schemas/Date'
        indicatieDiploma:
          $ref: '#/components/schemas/IndicatieDiploma'
        naamOpleidingsinstituut_W:
          $ref: '#/components/schemas/String500'
        toelichtingOpleiding:
          $ref: '#/components/schemas/String2000'          
      type: object
    Postcode:
      example: 1234AB
      pattern: ^[0-9]{4}[a-zA-Z]{2}$
      type: string
    Rijbewijs:
      additionalProperties: false
      properties:
        codeSoortRijbewijs:
          $ref: '#/components/schemas/codeSoortRijbewijs'
      type: object
    SectorBeroepsEnBedrijfsleven:
      additionalProperties: false
      properties:
        codeSbi:
          $ref: '#/components/schemas/Integer5'
      type: object
    Sollicitatiewijze:
      additionalProperties: false
      properties:
        codeSollicitatiewijze:
          enum:
          - '1'
          - '2'
          - '3'
          - '4'
          type: string
        webadres:
          $ref: '#/components/schemas/Webadres'
      type: object
    String100:
      maxLength: 100
      type: string
    String11:
      maxLength: 11
      type: string
    String120:
      maxLength: 120
      type: string
    String14:
      maxLength: 14
      type: string
    String200:
      maxLength: 200
      type: string
    String2000:
      maxLength: 2000
      type: string
    String24:
      maxLength: 24
      type: string
    String320:
      maxLength: 320
      type: string
    String35:
      maxLength: 35
      type: string
    String500:
      maxLength: 500
      type: string
    String6:
      maxLength: 6
      type: string
    String70:
      maxLength: 70
      type: string      
    StringCode:
      maxLength: 10
      type: string
    SafeIDString:
      pattern: ^[a-zA-Z0-9_.-]{0,200}$
      type: string
    TaalCode3:
      pattern: ^[a-z]{3}$
      type: string
    Taalbeheersing:
      additionalProperties: false
      properties:
        codeNiveauTaalbeheersingLezen:
          $ref: '#/components/schemas/IntegerTaal'
        codeNiveauTaalbeheersingLuisteren:
          $ref: '#/components/schemas/IntegerTaal'
        codeNiveauTaalbeheersingMondeling:
          $ref: '#/components/schemas/IntegerTaal'
        codeNiveauTaalbeheersingSchriftelijk:
          $ref: '#/components/schemas/IntegerTaal'
        codeTaal:
          $ref: '#/components/schemas/TaalCode3'
      type: object
    Telefoonnummer:
      $ref: '#/components/schemas/String14'
    URI:
      type: string
      maxLength: 200      
    URL:
      type: string
      maxLength: 1000
    Vacature:
      additionalProperties: false
      properties:
        adres:
          $ref: '#/components/schemas/Adres'        
        arbeidsVoorwaarden:
          $ref: '#/components/schemas/ArbeidsVoorwaarden'
        beroep:
          $ref: '#/components/schemas/Beroep'
        codeWerkEnDenkniveauMinimaal:
          enum:
          - '0'
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
          - '6'
          - '7'
          type: string
        contractvorm:
          items:
            $ref: '#/components/schemas/Contractvorm'
          type: array
        cursus:
          items:
            $ref: '#/components/schemas/Cursus'
          type: array
        flexibiliteit:
          $ref: '#/components/schemas/Flexibiliteit'
        competentiebeheersing:
          items:
            $ref: '#/components/schemas/Competentiebeheersing'
          type: array
        idVacature:
          $ref: '#/components/schemas/IDVacature'
        naamVacature:
          $ref: '#/components/schemas/String120'
        nummerVacature:
          $ref: '#/components/schemas/String11'
        omschrijvingVacature:
          $ref: '#/components/schemas/String2000'
        opleiding:
          items:
            $ref: '#/components/schemas/Opleiding'
          type: array
        rijbewijs:
          items:
            $ref: '#/components/schemas/Rijbewijs'
          type: array
        sector:
          $ref: '#/components/schemas/SectorBeroepsEnBedrijfsleven'
        sluitingsdatumVacature:
          $ref: '#/components/schemas/Date'
        sollicitatiewijze:
          items:
            $ref: '#/components/schemas/Sollicitatiewijze'
          type: array
        taalbeheersing:
          items:
            $ref: '#/components/schemas/Taalbeheersing'
          type: array
        vervoermiddel:
          items:
            $ref: '#/components/schemas/Vervoermiddel'
          type: array
        werkervaring:
          items:
            $ref: '#/components/schemas/Werkervaring'
          type: array
        werkgever:
          $ref: '#/components/schemas/Werkgever'
        werktijden:
          $ref: '#/components/schemas/Werktijden'
      required:
      - idVacature
      type: object
    VacatureMatchingProfielen:
      items:
        $ref: '#/components/schemas/MPVacatureMatch'
      type: array
    Vervoermiddel:
      additionalProperties: false
      properties:
        codeVervoermiddel:
          enum:
          - 1
          - 2
          - 3
          - 4
          - 5
          - 9
          type: integer
        indicatieBeschikbaarVoorUitvoeringWerk:
          $ref: '#/components/schemas/Indicatie'
        indicatieBeschikbaarVoorWoonWerkverkeer:
          $ref: '#/components/schemas/Indicatie'
      type: object
    VumID:
      type: string
      pattern: ^[a-zA-Z0-9_.-]{0,500}$
    Webadres:
      additionalProperties: false
      properties:
        codeWebadres:
          enum:
          - 1
          - 2
          - 3
          - 4
          type: integer
        url:
          $ref: '#/components/schemas/URL'
      type: object
    Werkervaring:
      additionalProperties: false
      properties:
        aantalJarenWerkzaamInBeroep_V:
          $ref: '#/components/schemas/Integer2'
        beroep_W:
          $ref: '#/components/schemas/Beroep'
        datumAanvangWerkzaamheden_W:
          $ref: '#/components/schemas/Date'
        datumEindeWerkzaamheden_W:
          $ref: '#/components/schemas/Date'
        naamOrganisatie_W:
          $ref: '#/components/schemas/String70'
        toelichtingWerkervaring_W:
          $ref: '#/components/schemas/String2000'
      type: object
    Werkgever:
      additionalProperties: false
      properties:
        contactpersoon:
          items:
            $ref: '#/components/schemas/ContactpersoonAfdeling'
          type: array
        handelsnaamOrganisatie:
          $ref: '#/components/schemas/String500'
        sector:
          items:
            $ref: '#/components/schemas/SectorBeroepsEnBedrijfsleven'
          type: array
        webadres:
          items:
            $ref: '#/components/schemas/Webadres'
          type: array
      type: object
    Werktijden:
      additionalProperties: false
      properties:
        aantalWerkurenPerWeekMaximaal:
          $ref: '#/components/schemas/Integer2'
        aantalWerkurenPerWeekMinimaal:
          $ref: '#/components/schemas/Integer2'
